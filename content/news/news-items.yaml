    ko: 6G 지능형 네트워킹 논문 IEEE TNSM 게재 확정
  description:
    en: >-
      Our latest research on intent-based autonomous networking for 6G systems
      has been accepted for publication in IEEE Transactions on Network and
      Service Management.
    ko: >-
      6G 시스템을 위한 인텐트 기반 자율 네트워킹에 관한 최신 연구가 IEEE
      Transactions on Network and Service Management에 게재 확정되었습니다.
