- id: fall-2025-recruitment
  category: Notices
  date: "2025-03-01"
  title:
    en: Graduate Student Applications Open for Fall 2025
    ko: 2025년 가을학기 대학원생 모집 안내
  description:
    en: >-
      INSLAB is now accepting applications for M.S. and Ph.D. candidates for the
      Fall 2025 semester. We are looking for motivated students interested in AI,
      networking, and IoT security.
    ko: >-
      INSLAB에서 2025년 가을학기 석사 및 박사과정 지원자를 모집합니다. AI,
      네트워킹, IoT 보안에 관심 있는 의욕적인 학생을 찾고 있습니다.
  imageUrl: ""

