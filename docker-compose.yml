services:
  # ── Admin (internal network only) ──────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./docker-data/admin:/data
    networks:
      - internal
      - external
    environment:
      - BUILDER_URL=http://builder:4000
      - DATA_DIR=/data
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SESSION_SECRET=${SESSION_SECRET:-inslab-prod-secret-change-me}
      - SITE_URL=http://localhost
      - PREVIEW_URL=http://localhost:9980
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    depends_on:
      builder:
        condition: service_healthy

  # ── Builder (internal, builds SSG on demand) ───────────────────────
  builder:
    build:
      context: .
      dockerfile: services/builder/Dockerfile
    volumes:
      - ./docker-data/admin:/data
      - ./docker-data/builder:/builder
      - ./docker-data/site:/out
    networks:
      - internal
      - external
    environment:
      - DATA_DIR=/data
      - OUT_DIR=/out
      - BUILDER_DIR=/builder
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Nginx (external, serves static files) ──────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker-data/site:/usr/share/nginx/html:ro
      - ./docker-data/admin/images:/data/images:ro
      - ./services/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/en/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    depends_on:
      builder:
        condition: service_healthy

  # ── Preview Nginx (internal, preview builds) ───────────────────
  preview-nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:9980:80"
    volumes:
      - ./docker-data/site:/usr/share/nginx/html:ro
      - ./docker-data/admin/images:/data/images:ro
      - ./services/nginx/preview.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
      - external
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy

networks:
  internal:
    internal: true
  external:
