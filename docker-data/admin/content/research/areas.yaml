# ============================================================
# 연구 분야 (Research Areas)
# 스키마: src/lib/content/schemas/research.ts
# ============================================================
# 연구 페이지에 카드 형태로 표시. 배열 순서대로 01, 02, 03... 번호 부여.
#
# 각 항목의 필드 설명:
#
#   id:          (필수, 문자열) 고유 식별자.
#                → 현재 아이콘/색상 매핑된 id:
#                  "intelligent-networking"    → 네트워크 아이콘, 파란색
#                  "distributed-ai"           → 칩 아이콘, 청록색
#                  "cyber-physical-systems"    → 방패 아이콘, 보라색
#                → 그 외 id는 기본 회색 스타일 적용
#                → 새 id 추가 시 src/features/research/components/research-area-section.tsx에서
#                  colorMap, iconComponents에 추가 필요
#   title:       (필수, 객체)  제목
#     ko:        (필수, 문자열) 한국어 제목
#     en:        (필수, 문자열) 영어 제목
#   description: (필수, 객체)  설명 (여러 단락 가능, |- 사용)
#     ko:        (필수, 문자열) 한국어 설명
#     en:        (필수, 문자열) 영어 설명
#                → UI에서는 첫 번째 단락만 표시됨 (\n\n 기준으로 분리)
#   keywords:    (필수, 배열)  키워드 목록.
#                → UI에서 최대 5개까지만 배지로 표시됨
#   papers:      (필수, 배열)  대표 논문 목록
#     - title:   (필수, 문자열) 논문 제목
#       venue:   (필수, 문자열) 학회/저널명. 예: "IEEE TNSM"
#       year:    (필수, 정수)  발표 연도
#
# ── 예시 ──
# - id: new-research-area
#   title:
#     ko: 새로운 연구 분야
#     en: New Research Area
#   description:
#     en: |-
#       First paragraph shown in the UI card.
#
#       Second paragraph is hidden but stored for future use.
#     ko: |-
#       UI 카드에 표시되는 첫 번째 단락.
#
#       두 번째 단락은 저장되지만 현재 UI에서는 숨김.
#   keywords:
#     - Keyword 1
#     - Keyword 2
#     - Keyword 3
#   papers:
#     - title: "Example Paper Title"
#       venue: "IEEE Access"
#       year: 2025
# ============================================================

- id: intelligent-networking
  title:
    en: Intelligent Network Systems
    ko: 지능형 네트워크 시스템
  description:
    en: |-
      Our Intelligent Network Systems research builds AI-powered networks and systems that autonomously adapt to changing conditions. We investigate intent-based autonomous networking, Edge AI deployment, and self-healing network architectures for distributed AIoT environments.

      Key contributions include intent-based autonomous networking for multi-domain mobile IoT, AI-driven network state cognition, and distributed edge multi-model inference. Our work bridges theoretical foundations with practical deployment across heterogeneous network environments.

      We collaborate with industry partners to develop smart city infrastructure and intelligent systems, ensuring AI services never stop in real-world environments.
    ko: |-
      지능형 네트워크 시스템 연구는 AI 기술을 핵심 동력으로 지능형 네트워크 및 시스템을 구현합니다. Intent 기반 자율 네트워킹, Edge AI 배포, 분산 AIoT 환경을 위한 자가 치유 네트워크 아키텍처를 연구합니다.

      주요 기여 분야로는 멀티도메인 모바일 사물인터넷을 위한 인텐트 기반 자율 네트워킹, AI 기반 네트워크 상태 인지, 분산 엣지 멀티모델 추론 등이 있습니다. 이론적 기반과 이기종 네트워크 환경에서의 실제 배포를 연결합니다.

      현업 기업과 협력하여 스마트 시티 인프라 및 지능형 시스템을 개발하며, AI 서비스가 현실 환경에서 멈추지 않도록 보장합니다.
  keywords:
    - AI Systems
    - Intelligent Networking
    - Edge AI
    - Intent-Based Networking
    - Network Optimization
    - MPTCP
    - Ad-Hoc Networks
  papers:
    - title: Intent-Based Autonomous Networking for Multi-Domain Mobile IoT
      venue: IEEE TNSM
      year: 2025
    - title: Deep Reinforcement Learning for Dynamic Resource Allocation in 6G Networks
      venue: IEEE ICC 2024
      year: 2024
    - title: LPWAN Framework for Industrial IoT Applications
      venue: IEEE Access
      year: 2023

- id: distributed-ai
  title:
    en: Data Intelligence
    ko: 데이터 지능
  description:
    en: |-
      Our Data Intelligence research builds data collection and processing pipelines across diverse environments. We focus on network data analysis, pattern recognition, anomaly detection, and efficient learning frameworks for sparse industrial data.

      Recent work includes our award-winning research on federated learning for edge networks (ICC 2024 Best Paper), time-series models for network performance degradation detection, and IIoT anomaly detection learning frameworks that effectively handle rare anomaly data.

      We also investigate MLOps pipelines for continuous model training and deployment, enabling seamless integration of AI capabilities into production systems with minimal latency and maximum reliability.
    ko: |-
      데이터 지능 연구는 다양한 환경에서의 데이터 수집 및 정제 프로세스를 구축합니다. 네트워크 데이터 분석, 패턴 인식, 이상 탐지, 산업 환경의 희소 데이터를 위한 효율적 학습 프레임워크에 집중합니다.

      최근 연구로는 엣지 네트워크를 위한 연합 학습(ICC 2024 최우수 논문상 수상), 시계열 모델을 활용한 네트워크 성능 저하 패턴 감지, 산업 환경의 희소 이상 데이터를 효과적으로 학습하는 IIoT 이상 탐지 학습 프레임워크 등이 있습니다.

      AI 기능을 최소 지연 시간과 최대 신뢰성으로 운영 시스템에 원활하게 통합할 수 있도록 지속적 모델 학습 및 배포를 위한 MLOps 파이프라인도 연구합니다.
  keywords:
    - Data Collection
    - Big Data
    - Preprocessing
    - Network Data Analysis
    - Pattern Recognition
    - Anomaly Detection
    - MLOps
  papers:
    - title: Federated Learning Optimization for Edge Networks
      venue: IEEE ICC 2024 (Best Paper)
      year: 2024
    - title: Communication-Efficient Federated Learning with Adaptive Aggregation
      venue: IEEE TNSM
      year: 2024
    - title: Privacy-Preserving Deep Learning for IoT Data Analytics
      venue: IEEE Access
      year: 2023

- id: cyber-physical-systems
  title:
    en: Intelligent Services
    ko: 지능형 서비스
  description:
    en: |-
      Our Intelligent Services research develops user-centric intelligent application services for real-world AI deployment. We build IoT applications, smart city solutions, mobile services, and computer vision-based intelligent systems.

      Key areas include AI-based smart city clean systems developed in collaboration with industry partners (abnormal behavior detection, illegal dumping detection, waste bag volume estimation), and practical deployments of AI monitoring systems across diverse environments.

      We focus on ensuring AI solutions work reliably in production, bridging the gap between research and real-world deployment through robust service architectures.
    ko: |-
      지능형 서비스 연구는 사용자 중심의 지능형 응용 서비스를 개발합니다. IoT 응용, 스마트 시티 솔루션, 모바일 서비스, 컴퓨터 비전 기반 지능형 시스템을 구축합니다.

      주요 연구 영역으로는 현업 기업과 협업하여 개발한 AI 기반 스마트 시티 클린 시스템(비정상 사용행위 감지, 불법투기 감지, 종량제 봉투 용량 판단), 다양한 환경에서의 AI 모니터링 시스템 실용적 배포 등이 있습니다.

      연구와 현실 배포 사이의 간극을 견고한 서비스 아키텍처로 연결하여 AI 솔루션이 운영 환경에서 안정적으로 작동하도록 합니다.
  keywords:
    - Intelligent Services
    - IoT Applications
    - Smart City
    - Mobile Services
    - Computer Vision
    - Embedded Software
    - Solutions
  papers:
    - title: GNN-Based Anomaly Detection for Industrial IoT Networks
      venue: IEEE Access
      year: 2025
    - title: AI-Based Monitoring System for Wildlife Conservation
      venue: Sensors
      year: 2022
    - title: Deep Learning Noise Analysis for Smart Factory Predictive Maintenance
      venue: KICS
      year: 2024
