#
# 각 항목의 필드 설명:
#
#   ko:    (필수, 문자열) 한국어 공지 텍스트. 이모지 사용 가능
#   en:    (필수, 문자열) 영어 공지 텍스트
#   href:  (선택, 문자열) 클릭 시 이동할 링크. 예: "/news", "/publications"
#                         → 생략 시 클릭 불가 (텍스트만 표시)
