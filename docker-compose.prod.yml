services:
  # ── Nginx: add HTTPS + certbot volumes ────────────────────────────
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./docker-data/site:/usr/share/nginx/html:ro
      - ./docker-data/admin/images:/data/images:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - ./services/nginx/nginx.ssl.conf:/etc/nginx/templates/default.conf.template:ro
      - ./services/nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./docker-data/certbot/www:/var/www/certbot:ro
      - ./docker-data/certbot/conf:/etc/letsencrypt
    environment:
      - DOMAIN=${DOMAIN}
    entrypoint: ["/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://127.0.0.1/en/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Admin: override SITE_URL to HTTPS ─────────────────────────────
  admin:
    environment:
      - BUILDER_URL=http://builder:4000
      - DATA_DIR=/data
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SESSION_SECRET=${SESSION_SECRET:-inslab-prod-secret-change-me}
      - SITE_URL=https://${DOMAIN}
      - PREVIEW_URL=http://localhost:9980

  # ── Certbot: automatic certificate renewal ────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./docker-data/certbot/www:/var/www/certbot
      - ./docker-data/certbot/conf:/etc/letsencrypt
      - ./services/certbot/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    environment:
      - DOMAIN=${DOMAIN}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    networks:
      - external
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped

networks:
  external:
