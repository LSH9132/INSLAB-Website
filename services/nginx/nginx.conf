server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # ── Locale redirect for root path ────────────────────────────────
    location = / {
        set $lang "en";
        if ($http_accept_language ~* "^ko") {
            set $lang "ko";
        }
        return 302 /$lang/;
    }

    # ── Images from shared volume (available before rebuild) ─────────
    location /images/ {
        alias /data/images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Static assets with long cache ────────────────────────────────
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── HTML pages with short cache ──────────────────────────────────
    location / {
        try_files $uri $uri/index.html =404;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; frame-ancestors 'none';" always;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    error_page 404 /404.html;
}
