server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html/preview;

    # ── Auth via admin session cookie ────────────────────────────────
    auth_request /_auth;

    location = /_auth {
        internal;
        proxy_pass http://admin:3000/api/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── Auth failure fallback (admin down → 401) ───────────────────
    error_page 500 502 503 =401 @denied;
    location @denied {
        return 401 "Unauthorized";
    }

    # ── Locale redirect for root path ────────────────────────────────
    location = / {
        set $lang "en";
        if ($http_accept_language ~* "^ko") {
            set $lang "ko";
        }
        return 302 /$lang/;
    }

    # ── Images from shared volume ──────────────────────────────────
    location /images/ {
        alias /data/images/;
        expires off;
        try_files $uri =404;
    }

    # ── Static assets ──────────────────────────────────────────────
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── HTML pages (no cache for preview) ──────────────────────────
    location / {
        try_files $uri $uri/index.html =404;
        expires off;
        add_header Cache-Control "no-cache";
    }

    # ── Security headers ───────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    error_page 404 /404.html;
}
