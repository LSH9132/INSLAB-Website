# ── HTTP: serve site + ACME challenge ─────────────────────────────
server {
    listen 80;
    server_name $DOMAIN;
    root /usr/share/nginx/html;

    # ── ACME challenge for certbot ────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── User directory: ~kimdy ────────────────────────────────────
    location = /~kimdy {
        return 301 /~kimdy/;
    }
    location ^~ /~kimdy/ {
        alias /data/userdir/kimdy/;
        index index.html;
        autoindex on;
    }

    # ── Locale redirect for root path ─────────────────────────────
    location = / {
        set $lang "en";
        if ($http_accept_language ~* "^ko") {
            set $lang "ko";
        }
        return 302 /$lang/;
    }

    # ── Images from shared volume ─────────────────────────────────
    location /images/ {
        alias /data/images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Static assets with long cache ─────────────────────────────
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── HTML pages with short cache ───────────────────────────────
    location / {
        try_files $uri $uri/index.html =404;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Security headers ──────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; frame-ancestors 'none';" always;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    error_page 404 /404.html;
}

# ── HTTPS: main site ───────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name $DOMAIN;
    root /usr/share/nginx/html;

    # ── SSL certificates ────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

    # ── TLS hardening ───────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # ── Session resumption ──────────────────────────────────────────
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── OCSP stapling ───────────────────────────────────────────────
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/$DOMAIN/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Locale redirect for root path ───────────────────────────────
    location = / {
        set $lang "en";
        if ($http_accept_language ~* "^ko") {
            set $lang "ko";
        }
        return 302 /$lang/;
    }

    # ── Images from shared volume ───────────────────────────────────
    location /images/ {
        alias /data/images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Static assets with long cache ───────────────────────────────
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── User directory: ~kimdy ────────────────────────────────────────
    location = /~kimdy {
        return 301 /~kimdy/;
    }
    location ^~ /~kimdy/ {
        alias /data/userdir/kimdy/;
        index index.html;
        autoindex on;
    }

    # ── HTML pages with short cache ─────────────────────────────────
    location / {
        try_files $uri $uri/index.html =404;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Security headers ────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; frame-ancestors 'none';" always;

    # ── Gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    error_page 404 /404.html;
}
